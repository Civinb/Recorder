<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.lime.min.css">
    <title>{% block title %}base{% endblock %}</title>
    <style>
        body {
            position: relative;
            min-height: 100vh;
        }
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url("{{ url_for('static', filename='background_pic/6aca374e0b6f4305a15ed59cecf1ae70.jpg') }}");
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            z-index: -2;
        }
        body::after {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(255, 255, 255, 0.7);
            z-index: -1;
        }
    </style>
</head>

<body>
    <header class="container">
        {% block header %}
            <div style="display: flex; align-items: center; gap: 50px;">
                <img src="{{ url_for('static', filename='icon/CVBRecorder_full.png') }}" alt="" width="150">
                <div style="display: flex; justify-content: space-between; align-items: center; gap: 15px;">
                    <a href="{{url_for('home')}}">Home</a>
                    <a href="{{url_for('settings')}}">Setting</a></li>
                </div>
            </div>
        <br>
        {% endblock %}
    </header>
    <main class="container">
        {% block content %}{% endblock %}
    </main>
    <footer class="container">
        {% block footer %}{% endblock %}
    </footer>
</body>
</html>
